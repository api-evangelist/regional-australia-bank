note: >-
  Two distinct surfaces. (1) The public Product Reference Data (PRD) API
  (Get Products / Get Product Detail) is PUBLIC and UNAUTHENTICATED - no API key,
  no token; only the required `x-v` version header. (2) The authenticated CDR
  consumer data sharing operations use the CDR security profile: OAuth2
  Authorization Code with PKCE, OpenID Connect, and FAPI-aligned protections
  (mutual-TLS sender-constrained tokens, request objects, PAR). Access is limited
  to accredited data recipients on the CDR Register. The harvested CDS spec does
  not declare formal `components.securitySchemes`; it carries the required scopes
  as `x-scopes` extensions per operation.
