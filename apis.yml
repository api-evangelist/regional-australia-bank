name: Regional Australia Bank
kind: company
description: Regional Australia Bank is a customer-owned (mutual) authorised deposit-taking
  institution (ADI) headquartered in Armidale and Port Macquarie, New South Wales. Founded
  in 1969 as New England Staff Credit Union at the University of New England, it grew through
  successive credit-union mergers into Community Mutual Group and rebranded as Regional
  Australia Bank in 2016; it is currently completing a merger with Summerland Bank. As a
  mutual, its customers are its owners, and it serves more than 100,000 members across
  regional NSW from roughly 39 locations. As an active ADI it is a designated data holder
  under Australia's Consumer Data Right (CDR / Open Banking), exposing a public,
  unauthenticated Product Reference Data (PRD) API conforming to the Data Standards Body
  (DSB) Consumer Data Standards, alongside the accredited-data-recipient consumer data
  sharing surface secured under the CDR OAuth2/OIDC model.
