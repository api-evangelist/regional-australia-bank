  description: Consumer-authorized Consumer Data Right (CDR) Banking API family for
    recurring transactions - Get Direct Debits For Account, Get Bulk Direct Debits, Get
    Scheduled Payments For Account and Get Scheduled Payments Bulk (paths
    /banking/accounts/{accountId}/direct-debits, /banking/accounts/direct-debits,
    /banking/accounts/{accountId}/payments/scheduled and /banking/payments/scheduled).
