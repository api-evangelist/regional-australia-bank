apis:
- aid: regional-australia-bank:regional-australia-bank-cdr-product-reference-data-api
  name: Regional Australia Bank CDR Product Reference Data API
  tags:
  - CDR
  - Open Banking
  - Product Reference Data
  - Banking Products
  - Public
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.regionalaustraliabank.com.au/help-and-support/data-sharing
  baseURL: https://public-data.cdr.regaustbank.io/cds-au/v1/banking/products
  properties:
  - url: https://www.regionalaustraliabank.com.au/help-and-support/data-sharing
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#banking-apis
    type: APIReference
  - url: openapi/regional-australia-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  - url: overlays/regional-australia-bank-cds-banking-products-overlay.yaml
    type: Overlay
  description: Public, unauthenticated Consumer Data Right (CDR) Product Reference Data
    (PRD) API. Serves Regional Australia Bank's openly available banking product catalogue
    (Get Products and Get Product Detail) at the CDS base path /cds-au/v1/banking/products,
    conforming to the DSB Consumer Data Standards. Confirmed live (HTTP 200, x-v 3) with a
    data.products array; no authentication or CDR accreditation is required for this
    product-reference surface. The referenced OpenAPI is the shared DSB Consumer Data
    Standards "CDR Banking API" v1.36.0 (the standardized surface every AU ADI data holder
    implements), not a bank-proprietary specification.
- aid: regional-australia-bank:regional-australia-bank-cdr-accounts-balances-api
  name: Regional Australia Bank CDR Accounts & Balances API
  tags:
  - CDR
  - Open Banking
  - Banking Accounts
  - Account Balances
  - Consumer Data Sharing
  - Authorized
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.regionalaustraliabank.com.au/help-and-support/data-sharing
  baseURL: https://public-data.cdr.regaustbank.io/cds-au/v1/banking/accounts
  properties:
  - url: https://www.regionalaustraliabank.com.au/help-and-support/data-sharing
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#banking-apis
    type: APIReference
  - url: openapi/regional-australia-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorized Consumer Data Right (CDR) Banking API family for accounts
    and balances - Get Accounts, Get Bulk Balances, Get Account Balance and Get Account
    Detail (paths /banking/accounts, /banking/accounts/balances,
    /banking/accounts/{accountId}/balance and /banking/accounts/{accountId}). Unlike the
    public product-reference surface, these endpoints return a consumer's own banking data
    and are served from Regional Australia Bank's secured MTLS CDR resource server
    (registered in the CDR Register) under the CDR OAuth2/OIDC model; access requires an
    Accredited Data Recipient (ADR) and explicit consumer consent, so the host is not
    publicly browsable. Standardized by the DSB Consumer Data Standards (CDR Banking API
    v1.36.0); see the referenced OpenAPI.
