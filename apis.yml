  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.regionalaustraliabank.com.au/help-and-support/data-sharing
  baseURL: https://public-data.cdr.regaustbank.io/cds-au/v1/banking/products
  properties:
  - url: https://www.regionalaustraliabank.com.au/help-and-support/data-sharing
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#banking-apis
    type: APIReference
  - url: openapi/regional-australia-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  - url: overlays/regional-australia-bank-cds-banking-products-overlay.yaml
    type: Overlay
  description: Public, unauthenticated Consumer Data Right (CDR) Product Reference Data
    (PRD) API. Serves Regional Australia Bank's openly available banking product catalogue
    (Get Products and Get Product Detail) at the CDS base path /cds-au/v1/banking/products,
    conforming to the DSB Consumer Data Standards. Confirmed live (HTTP 200, x-v 3) with a
    data.products array; no authentication or CDR accreditation is required for this
    product-reference surface.
