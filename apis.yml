  - url: https://consumerdatastandardsaustralia.github.io/standards/#banking-apis
    type: APIReference
  - url: openapi/regional-australia-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorized Consumer Data Right (CDR) Banking API family for account
    transactions - Get Transactions For Account and Get Transaction Detail (paths
    /banking/accounts/{accountId}/transactions and
    /banking/accounts/{accountId}/transactions/{transactionId}). Returns a consenting
    consumer's own transaction history and is served from Regional Australia Bank's secured
    MTLS CDR resource server under the CDR OAuth2/OIDC model; access requires an Accredited
    Data Recipient (ADR) and explicit consumer consent, so the host is not publicly
    browsable. Standardized by the DSB Consumer Data Standards (CDR Banking API v1.36.0);
    see the referenced OpenAPI.
